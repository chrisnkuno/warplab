version: 1
name: saxpy
description: "SAXPY benchmark for WarpLab"

build:
  compile_kernel: >
    nvcc -O3 -lineinfo -o {artifact} bench.cu kernel.cu {flags}
  compile_validate: >
    nvcc -O3 -lineinfo -o {artifact} validate.cu kernel.cu {flags}

run:
  benchmark: "{artifact} --size {size} --warmups {warmups} --repeats {repeats}"
  validate: "{artifact} --size {validation_size} --atol {atol} --rtol {rtol}"

input:
  size: 10000000
  validation_size: 1000000

objective:
  metric: latency_ms
  direction: minimize

search_space:
  block_size: [64, 128, 256, 512]
  unroll: [1, 2, 4, 8]
  vector_width: [1, 2, 4]

constraints:
  - "vector_width <= 4"
  - "block_size % 32 == 0"

validation:
  atol: 1e-6
  rtol: 1e-5

budget:
  max_experiments: 100
  warmup_runs: 5
  timed_runs: 20
