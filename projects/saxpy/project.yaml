name: saxpy
description: "SAXPY benchmark for WarpLab"

build:
  compile_kernel: >
    nvcc -O3 -lineinfo -o build/bench bench.cu kernel.cu
  compile_validate: >
    nvcc -O3 -lineinfo -o build/validate validate.cu kernel.cu

run:
  benchmark: "./build/bench --size {size} --repeats {repeats}"
  validate: "./build/validate --size {size}"

input:
  size: 10000000
  repeats: 50

objective:
  metric: latency_ms
  direction: minimize

search_space:
  block_size: [64, 128, 256, 512]
  unroll: [1, 2, 4, 8]
  vector_width: [1, 2, 4]
  use_shared: [true, false]

constraints:
  - "vector_width <= 4"
  - "block_size % 32 == 0"

validation:
  atol: 1e-6
  rtol: 1e-5

budget:
  max_experiments: 100
  warmup_runs: 5
  timed_runs: 20
