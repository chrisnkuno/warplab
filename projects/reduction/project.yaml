version: 1
name: reduction
description: "Block-level float reduction benchmark for WarpLab"

build:
  compile_kernel: >
    nvcc -O3 -lineinfo -o {artifact} bench.cu kernel.cu {flags}
  compile_validate: >
    nvcc -O3 -lineinfo -o {artifact} validate.cu kernel.cu {flags}

run:
  benchmark: "{artifact} --size {size} --warmups {warmups} --repeats {repeats}"
  validate: "{artifact} --size {size} --atol {atol} --rtol {rtol}"

input:
  size: 16777216
  repeats: 40

objective:
  metric: latency_ms
  direction: minimize

search_space:
  block_size: [128, 256, 512]
  items_per_thread: [1, 2, 4, 8]
  unroll: [1, 2, 4]

constraints:
  - "block_size % 32 == 0"
  - "items_per_thread >= 1"
  - "items_per_thread <= 8"

validation:
  atol: 1e-4
  rtol: 1e-4

budget:
  max_experiments: 80
  warmup_runs: 5
  timed_runs: 20
