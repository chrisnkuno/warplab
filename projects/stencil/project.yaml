version: 1
name: stencil
description: "1D stencil benchmark for WarpLab"

build:
  compile_kernel: >
    nvcc -O3 -lineinfo -o {artifact} bench.cu kernel.cu {flags}
  compile_validate: >
    nvcc -O3 -lineinfo -o {artifact} validate.cu kernel.cu {flags}

run:
  benchmark: "{artifact} --size {size} --warmups {warmups} --repeats {repeats}"
  validate: "{artifact} --size {size} --atol {atol} --rtol {rtol}"

input:
  size: 16777216
  repeats: 40

objective:
  metric: latency_ms
  direction: minimize

search_space:
  block_size: [64, 128, 256, 512]
  unroll: [1, 2, 4]
  use_shared: [true, false]

constraints:
  - "block_size % 32 == 0"

validation:
  atol: 1e-5
  rtol: 1e-5

budget:
  max_experiments: 80
  warmup_runs: 5
  timed_runs: 20
