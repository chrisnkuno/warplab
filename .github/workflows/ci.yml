name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - name: Sync environment
        run: uv sync --dev --frozen
      - name: Run tests
        run: uv run pytest -q
      - name: Validate notebook JSON
        run: python -m json.tool notebooks/warplab_v1.ipynb > /dev/null
      - name: Compile Python sources
        run: uv run python -m compileall warplab tests
